name: Android Release Build

# Builds a signed Android App Bundle (.aab) for the Thinkit customer app
# (artifacts/thinkit-app) from the current production web build.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_FILE     - base64-encoded contents of the release .jks/.keystore
#                        file (e.g. `base64 -w0 release.keystore`)
#   KEYSTORE_PASSWORD - the keystore's store password
#   KEY_ALIAS         - the signing key alias inside the keystore
#   KEY_PASSWORD      - the signing key's password
#
# None of these values are ever logged, echoed, or written into the repo.
# The keystore is decoded to a temporary file that only exists on the
# runner's disk for the duration of the job.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "android-v*"

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production web bundle
        # PORT / BASE_PATH match artifacts/thinkit-app/.replit-artifact/artifact.toml
        run: pnpm --filter @workspace/thinkit-app run build
        env:
          PORT: "24545"
          BASE_PATH: "/"

      - name: Sync Capacitor Android project
        run: pnpm --filter @workspace/thinkit-app run cap:sync

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode signing keystore
        # Writes the keystore to a runner-local temp file. This file never
        # gets committed and is discarded when the job finishes.
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          echo "$KEYSTORE_FILE_B64" | base64 --decode > "$KEYSTORE_PATH"
          echo "KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        working-directory: artifacts/thinkit-app/android

      - name: Build signed release AAB
        working-directory: artifacts/thinkit-app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkit-release-aab
          path: artifacts/thinkit-app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
