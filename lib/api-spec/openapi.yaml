openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin-auth
    description: Admin authentication
  - name: admin-dashboard
    description: Admin dashboard
  - name: admin-orders
    description: Order management
  - name: admin-password-reset
    description: Manual customer password reset requests
  - name: admin-products
    description: Product management
  - name: admin-product-variants
    description: Product variant (pack size) management
  - name: admin-banners
    description: Banner management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Admin Auth ────────────────────────────────────────────────────────────────
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin-auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin-auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated

  # ── Admin Dashboard ───────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin-dashboard]
      summary: Get dashboard stats and recent orders
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── Admin Orders ──────────────────────────────────────────────────────────────
  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin-orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status
        - name: date
          in: query
          schema:
            type: string
          description: Filter by date (YYYY-MM-DD)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}:
    get:
      operationId: getAdminOrder
      tags: [admin-orders]
      summary: Get order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /admin/orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [admin-orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /admin/orders/{id}/delivery-partner:
    patch:
      operationId: assignDeliveryPartner
      tags: [admin-orders]
      summary: Assign or update the delivery partner for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryPartnerInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  # ── Admin Password Reset Requests (manual, temporary) ───────────────────────
  /admin/password-reset-requests:
    get:
      operationId: listPasswordResetRequests
      tags: [admin-password-reset]
      summary: List customer password reset requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (pending, completed, rejected)
      responses:
        "200":
          description: List of password reset requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PasswordResetRequest"

  /admin/password-reset-requests/{id}/generate-temp-password:
    post:
      operationId: generateTempPassword
      tags: [admin-password-reset]
      summary: Generate and assign a temporary password for the requesting customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Temporary password generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTempPasswordResult"
        "404":
          description: Request not found

  /admin/password-reset-requests/{id}/complete:
    post:
      operationId: completePasswordResetRequest
      tags: [admin-password-reset]
      summary: Manually mark a password reset request as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequest"
        "404":
          description: Request not found

  /admin/password-reset-requests/{id}/reject:
    post:
      operationId: rejectPasswordResetRequest
      tags: [admin-password-reset]
      summary: Reject a password reset request and invalidate any issued temporary password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequest"
        "404":
          description: Request not found

  # ── Admin Products ────────────────────────────────────────────────────────────
  /admin/products:
    get:
      operationId: listAdminProducts
      tags: [admin-products]
      summary: List products with optional search/filter
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by name or brand
        - name: category
          in: query
          schema:
            type: string
          description: Filter by categoryId
        - name: inStock
          in: query
          schema:
            type: boolean
          description: Filter by stock status
        - name: enabled
          in: query
          schema:
            type: boolean
          description: Filter by enabled status
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProduct"
    post:
      operationId: createAdminProduct
      tags: [admin-products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"

  /admin/products/bulk:
    post:
      operationId: bulkImportProducts
      tags: [admin-products]
      summary: Bulk import products from parsed CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportInput"
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /admin/products/{id}:
    get:
      operationId: getAdminProduct
      tags: [admin-products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
    patch:
      operationId: updateAdminProduct
      tags: [admin-products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
    delete:
      operationId: deleteAdminProduct
      tags: [admin-products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/products/{id}/stock:
    patch:
      operationId: toggleProductStock
      tags: [admin-products]
      summary: Toggle product in-stock status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockToggle"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found

  # ── Admin Product Variants ────────────────────────────────────────────────────
  /admin/products/{id}/variants:
    get:
      operationId: listProductVariants
      tags: [admin-product-variants]
      summary: List variants (pack sizes) for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductVariant"
    post:
      operationId: createProductVariant
      tags: [admin-product-variants]
      summary: Create a new variant (pack size) for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Created variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "404":
          description: Product not found

  /admin/products/variants/{variantId}:
    patch:
      operationId: updateProductVariant
      tags: [admin-product-variants]
      summary: Update a variant
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantUpdate"
      responses:
        "200":
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "404":
          description: Variant not found
    delete:
      operationId: deleteProductVariant
      tags: [admin-product-variants]
      summary: Delete a variant
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Variant not found

  # ── Admin Banners ─────────────────────────────────────────────────────────────
  /admin/banners:
    get:
      operationId: listAdminBanners
      tags: [admin-banners]
      summary: List all banners
      responses:
        "200":
          description: List of banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createAdminBanner
      tags: [admin-banners]
      summary: Create a banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerInput"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /admin/banners/{id}:
    patch:
      operationId: updateAdminBanner
      tags: [admin-banners]
      summary: Update a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerUpdate"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
        "404":
          description: Banner not found
    delete:
      operationId: deleteAdminBanner
      tags: [admin-banners]
      summary: Delete a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Admin Auth schemas ──────────────────────────────────────────────────────
    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminMe:
      type: object
      required: [username]
      properties:
        username:
          type: string

    # ── Dashboard schemas ───────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [todayOrders, todaySales, pendingOrders, outForDelivery, avgDeliveryMinutes, recentOrders]
      properties:
        todayOrders:
          type: integer
        todaySales:
          type: integer
        pendingOrders:
          type: integer
        outForDelivery:
          type: integer
        avgDeliveryMinutes:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    # ── Order schemas ───────────────────────────────────────────────────────────
    OrderItem:
      type: object
      required: [name, brand, weight, qty, price]
      properties:
        productId:
          type: ["integer", "null"]
        name:
          type: string
        brand:
          type: string
        weight:
          type: string
        qty:
          type: integer
        price:
          type: integer

    OrderAddress:
      type: object
      required: [houseNumber, area, pincode]
      properties:
        houseNumber:
          type: string
        area:
          type: string
        landmark:
          type: ["string", "null"]
        pincode:
          type: string

    Order:
      type: object
      required: [id, orderNumber, customerName, customerMobile, address, items, subtotal, smallCartFee, deliveryFee, handlingFee, grandTotal, paymentMethod, status, createdAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerId:
          type: ["integer", "null"]
        customerName:
          type: string
        customerMobile:
          type: string
        address:
          $ref: "#/components/schemas/OrderAddress"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: integer
        smallCartFee:
          type: integer
        deliveryFee:
          type: integer
        handlingFee:
          type: integer
        grandTotal:
          type: integer
        paymentMethod:
          type: string
        orderNote:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
        deliveryPartnerName:
          type: ["string", "null"]
        deliveryPartnerMobile:
          type: ["string", "null"]
        deliveryPartnerPhotoUrl:
          type: ["string", "null"]
        deliveryPartnerVehicleType:
          type: ["string", "null"]
        deliveryPartnerVehicleNumber:
          type: ["string", "null"]

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DeliveryPartnerInput:
      type: object
      required: [name, mobile]
      properties:
        name:
          type: string
        mobile:
          type: string
        photoUrl:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
        vehicleNumber:
          type: ["string", "null"]

    # ── Password Reset Request schemas (manual, temporary) ─────────────────────
    PasswordResetRequest:
      type: object
      required: [id, userId, customerName, customerMobile, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        customerName:
          type: string
        customerMobile:
          type: string
        status:
          type: string
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    GenerateTempPasswordResult:
      type: object
      required: [request, temporaryPassword]
      properties:
        request:
          $ref: "#/components/schemas/PasswordResetRequest"
        temporaryPassword:
          type: string
          description: One-time plaintext temporary password shown only to the admin at generation time. Never returned again by any endpoint.

    # ── Product schemas ─────────────────────────────────────────────────────────
    AdminProduct:
      type: object
      required: [id, name, brand, categoryId, weight, mrp, price, stockQty, inStock, enabled, isBestSeller, isDwarikaSpecial, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        categoryId:
          type: string
        subcategory:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        mrp:
          type: integer
        price:
          type: integer
        weight:
          type: string
        imageUrl:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        stockQty:
          type: integer
        inStock:
          type: boolean
        enabled:
          type: boolean
        isBestSeller:
          type: boolean
        isDwarikaSpecial:
          type: boolean
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, brand, categoryId, weight, mrp, price]
      properties:
        name:
          type: string
        brand:
          type: string
        categoryId:
          type: string
        subcategory:
          type: string
        description:
          type: string
        mrp:
          type: integer
        price:
          type: integer
        weight:
          type: string
        imageUrl:
          type: string
        sku:
          type: string
        stockQty:
          type: integer
        inStock:
          type: boolean
        enabled:
          type: boolean
        isBestSeller:
          type: boolean
        isDwarikaSpecial:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        categoryId:
          type: string
        subcategory:
          type: string
        description:
          type: string
        mrp:
          type: integer
        price:
          type: integer
        weight:
          type: string
        imageUrl:
          type: string
        sku:
          type: string
        stockQty:
          type: integer
        inStock:
          type: boolean
        enabled:
          type: boolean
        isBestSeller:
          type: boolean
        isDwarikaSpecial:
          type: boolean

    # ── Product variant (pack size) schemas ───────────────────────────────────────
    ProductVariant:
      type: object
      required: [id, productId, name, weight, mrp, price, stockQty, active, sortOrder, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        weight:
          type: string
        mrp:
          type: integer
        price:
          type: integer
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        stockQty:
          type: integer
        active:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    ProductVariantInput:
      type: object
      required: [name, weight, mrp, price]
      properties:
        name:
          type: string
        weight:
          type: string
        mrp:
          type: integer
        price:
          type: integer
        sku:
          type: string
        barcode:
          type: string
        stockQty:
          type: integer
        active:
          type: boolean
        sortOrder:
          type: integer

    ProductVariantUpdate:
      type: object
      properties:
        name:
          type: string
        weight:
          type: string
        mrp:
          type: integer
        price:
          type: integer
        sku:
          type: string
        barcode:
          type: string
        stockQty:
          type: integer
        active:
          type: boolean
        sortOrder:
          type: integer

    StockToggle:
      type: object
      required: [inStock]
      properties:
        inStock:
          type: boolean

    BulkImportInput:
      type: object
      required: [products]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductInput"

    BulkImportResult:
      type: object
      required: [imported, updated, failed, errors]
      properties:
        imported:
          type: integer
        updated:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string

    # ── Banner schemas ──────────────────────────────────────────────────────────
    Banner:
      type: object
      required: [id, title, enabled, sortOrder, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        buttonText:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        bg:
          type: ["string", "null"]
        enabled:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    BannerInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        subtitle:
          type: string
        buttonText:
          type: string
        imageUrl:
          type: string
        bg:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer

    BannerUpdate:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        buttonText:
          type: string
        imageUrl:
          type: string
        bg:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer

